<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard — SIMAR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/styles.css"/>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <script src="/js/utils.js"></script>
  <script src="/js/admin-sidebar.js"></script>

  <div class="admin-layout">

    <!-- Sidebar injected by admin-sidebar.js -->
    <div id="admin-sidebar-mount"></div>

    <main class="admin-main">

      <h2 style="font-family:var(--font-heading);color:var(--brown);margin-bottom:0.3rem;">
        Dashboard
      </h2>
      <p style="color:var(--text-light);font-size:0.9rem;margin-bottom:2rem;">
        Welcome back! Here is what is happening with SIMAR today.
      </p>

      <!-- Stat cards -->
      <div class="stat-cards" id="stat-cards">
        <div class="skeleton" style="height:90px;border-radius:16px;"></div>
        <div class="skeleton" style="height:90px;border-radius:16px;"></div>
        <div class="skeleton" style="height:90px;border-radius:16px;"></div>
        <div class="skeleton" style="height:90px;border-radius:16px;"></div>
        <div class="skeleton" style="height:90px;border-radius:16px;"></div>
        <div class="skeleton" style="height:90px;border-radius:16px;"></div>
      </div>

      <!-- Recent orders -->
      <h3 style="font-family:var(--font-heading);color:var(--brown);
                 margin-bottom:1.2rem;">Recent Orders</h3>

      <div class="admin-table-wrap">
        <table class="admin-table" id="orders-table">
          <thead>
            <tr>
              <th>Customer</th>
              <th>Item</th>
              <th>Total</th>
              <th>Date</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="orders-tbody">
            <tr><td colspan="6" style="text-align:center;padding:2rem;">
              Loading orders...
            </td></tr>
          </tbody>
        </table>
      </div>

    </main>
  </div>

  <script src="/js/admin-dashboard.js"></script>

</body>
</html>
