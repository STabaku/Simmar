<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — SIMAR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/styles.css"/>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<script src="/js/utils.js"></script>
  <script src="/js/navbar.js"></script>

  <section class="auth-section">
    <div class="auth-decoration">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
    </div>

    <div class="auth-card">

      <!-- logo mark -->
      <div class="auth-logo">
        <i data-lucide="flower-2" width="28" height="28"></i>
      </div>

      <h1 class="form-title">Welcome back</h1>
      <p class="form-subtitle">Sign in to your SIMAR account</p>

      <!-- error message -->
      <div class="alert alert-error" id="login-error" style="display:none;"></div>

      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input class="form-input" type="email" id="email"
               placeholder="your@email.com" autocomplete="email"/>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-with-icon">
          <input class="form-input" type="password" id="password"
                 placeholder="Your password" autocomplete="current-password"/>
          <button class="input-icon-btn" id="toggle-password" type="button"
                  aria-label="Show password">
            <i data-lucide="eye" width="16" height="16"></i>
          </button>
        </div>
      </div>

      <button class="btn btn-primary btn-full" id="login-btn">
        <i data-lucide="log-in" width="16" height="16"></i>
        Sign In
      </button>

      <p class="form-link">
        Don't have an account?
        <a href="/pages/register.html">Create one</a>
      </p>

    </div>
  </section>

  <script src="/js/footer.js"></script>
  <script src="/js/auth.js"></script>

</body>
</html>
