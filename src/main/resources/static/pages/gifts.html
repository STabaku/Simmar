<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gifts — SIMAR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/styles.css"/>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<script src="/js/utils.js"></script>
  <script src="/js/navbar.js"></script>

  <!-- Page hero -->
  <section class="page-hero">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="container">
      <div class="page-hero-label">
        <i data-lucide="gift" width="13" height="13"></i>
        Complementary items
      </div>
      <h1 class="page-hero-title">Gifts & Extras</h1>
      <p class="page-hero-sub">Complete your gift with something special</p>
    </div>
  </section>

  <!-- Gifts grid -->
  <section class="gifts-section">
    <div class="container">

      <div class="bouquets-grid-4" id="gifts-grid">
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
      </div>

    </div>
  </section>

  <!-- Gift detail modal -->
  <div class="modal-overlay" id="gift-modal">
    <div class="modal-card">

      <button class="modal-close" onclick="closeModal()">
        <i data-lucide="x" width="14" height="14"></i>
      </button>

      <div class="modal-img" id="modal-img">🎁</div>

      <h3 class="modal-name" id="modal-name"></h3>
      <div class="modal-price" id="modal-price"></div>

      <div class="modal-details" id="modal-details"></div>
      <p class="modal-desc" id="modal-desc"></p>

      <button class="btn btn-primary btn-full" id="modal-order-btn">
        <i data-lucide="shopping-bag" width="16" height="16"></i>
        Add to Order
      </button>

    </div>
  </div>

  <script src="/js/footer.js"></script>
  <script src="/js/gifts.js"></script>

</body>
</html>
